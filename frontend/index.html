<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <title>Lung Whisperer - Intelligent Respiratory Monitoring</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Emergency mount detection
      setTimeout(() => {
        const root = document.getElementById('root');
        if (root && root.innerHTML === "") {
          console.warn("React mount failure detected. Clearing cache and rebooting...");
          localStorage.clear();
          if (!window.location.search.includes('retry=1')) {
            window.location.href = window.location.pathname + "?retry=1";
          }
        }
      }, 3500);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
